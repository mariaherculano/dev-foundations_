<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ToDo Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <h1>📋 ToDo! Pro</h1>
    <p id="counter"></p>

    <div class="task-form">
      <input type="text" id="taskInput" placeholder="Nova tarefa">
      
      <select id="priority">
        <option value="Baixa">Baixa</option>
        <option value="Média">Média</option>
        <option value="Alta">Alta</option>
      </select>

      <button id="addTaskBtn">Adicionar</button>
    </div>

    <div class="filters">
      <button data-filter="all">Todas</button>
      <button data-filter="pending">Pendentes</button>
      <button data-filter="completed">Concluídas</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
